name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller spectercraft.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpecterCraft-Windows
          path: dist/SpecterCraft.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller spectercraft.spec --noconfirm

      - name: Zip .app bundle
        run: cd dist && ditto -c -k --sequesterRsrc --keepParent SpecterCraft.app SpecterCraft-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpecterCraft-macOS
          path: dist/SpecterCraft-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller spectercraft.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpecterCraft-Linux
          path: dist/SpecterCraft
